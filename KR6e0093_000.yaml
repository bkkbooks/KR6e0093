front:
  text: 創鐫華嚴遊心法界記序天下之言性也則故而已矣而性亦非一也蓋世間之性賢與不肖也賢無事而不肖鑿也出世之性三衍定性局不定通而進者性如盡者性藏已若夫出出世之性謂七大焉三千焉帝網焉即不思議運之稱以名于法界也然以法界為自性者其惟別教一乘乎茲之教蓋娑竭之所降非海不受豈不稱之別也麟猊之所遊非白牛不俱其謂之一宜矣所謂別教一乘者普賢是也普賢者心色而已矣夫海由水滴深山從纍土高智積材而博心統性而厚是故心以法界為性矣於乎法界不可須臾離也李唐魏國西寺賢首大師所撰遊心法界記乃彌勒觀之脊梁普賢道之轡軫也苟或秉路反己晝茅宵綯欲不至其得乎如夫內城不解而為他所保者則弗與焉其身不正而媚乎浮圖者恥也豈不思諸匹夫之修德者是君和順畜中而英華發外雖聖或不修則不肖矣普賢惡有他哉亦人之類已南邁童子從遊金猊而覓師於百十此進普賢行之碩跡也跡為則象為鑒法界記之所由起也記者以先信焉夫商丘開之信僞猶能泳水得珠矧其真矣愨矣乎何謂信不疑是已心一而止分別一以貫之真矣忠矣橫六合而莫逆也若夫投于五熱豈思作意邪故有云信理亡是非信性亡安危亡也者唯也唯而嚮事者信也真矣愨矣奚不為哉云何是信曰信乎心之法界信乎遊心法界群生心有何界邪曰目短於自見故鏡照物智短於自知故心觀界其苟觀之奚不遊心于法界歟夫一拳之轡綱以御八尺龍馬九層之開閉受制於寸關故曰五寸之矩以盡天下之方能譬哉心奚不遊於法界哉人之遊山焉野焉自爾矣然不行不遊行乎其行聞焉必進熏焉必動遊之能證入焉者亦自爾矣假使目視鼻向無信其亦如聾啞耳法界乎廣矣大矣聾啞聰辨孰不法界者乾坤其無罅哉嗚呼亦大矣其苟或壞則雖法界弗與矣亦未由見道今也東方國運隆盛人文丕彰蕩蕩大和真風競起則十宗奮動四輪咸發蓋探靳虬藏者信手而得焉皇矣聖道之昭也伯令之曠也人事備富技器不乏惟我天平延喜之事則古矣自是以來未有若是盛也昔者吾先師白天老人遊南都東大寺得遊心法界記一部以欲示大方弗果亡幾師逝矣噫逝矣吾其何為夫不為乃已為之何所不為于是小子飛錫而西也千里翩翩然來東大寺乃遂得其真本而挍之以垂不朽也此記寥寥乎未出人間尚矣今而公於世此非吾聖德昭曠之所致歟伏豫明德其有為乎何所不為且也金剛場因果無二菩薩者乃苦界直入報土開引之證也如小子山於其浩浩恩波未能涓渧報之也是以繼白老人之志願梓以布諸海內享保戊申仲夏日武陽沙門白蘋雅山謹題於京師之寓舍華嚴遊心法界記序猗歟盛哉吾本邦也自往富乎聖典反勝於震旦高麗之徼或可倍蓰矣至今儼然而存世編猶謂中國失禮求之四夷況聖教乎茲有蓮宗之賓叩余遂云久褚是書為我師之遺志將壽之於梓其可可也歟豫聞太歡且獎因為作序云夫遊心法界記者何也其文源出華嚴而記實賢首祖師之談也舊經偈曰遊心法界如虛空是人乃知佛境界蓋謂遊心者能觀之智行也法界者所觀之諦理也如虛空者直是不俟三轉而誦虛即假也空即空也如虛如空即中也非虛非空義在厥中夫此文者是大節也天台止觀嘗揭斯文作三諦觀而不啻此文獨大節義抑且如真言三藏曰彼華嚴中而文而句咸具顯略深祕二門之義誠哉是判豈可輒得測度耶斯偈既言是人乃佛境界則明匪祇果海鎔融而已萬惑繁冗是知佛境界劍林刃山西來之祖意介爾有心三千宛焉創心起觀之扃也祕要入理之樞也微塵剎剎靡不諸聖人出於世之處良以難與劣慧而語幾止而已矣頃有腐儒著斷簡云東海不出聖人西海不出聖人者於呼胡為愚之壅哉最小見矣徒認一介孔丘以為聖人䆮僭區區支那而想中國獨獲牝獸傳稱靈祥以思瑞應兮夫吾法中乍擬麟角獨覺僅小聖者尚無其德及千萬分之一焉耳噫所謂真之蛙見矣蓋與夫坐井觀天曰天小者亦不甚逖不足復言豫自今念震丹雖闊於我正法未東漸之前適有曰聖人而出者而後不復出豈不聞乎東漢天子自夢金人則西方有聖人出昭昭然而著矣街童巷婦而不可欺何況東海我日域者神聖之國也上下神祇皆盡神孫蔑有不為神之民者然則凡諸託生於中者所有蠢動皆戴於神之天共鳩乎神之地實為神之民者則其猥曰東海不出聖人者上誣罔乎神譏刺於祖巨諷於國之姦賊者其愆莫逾于斯也哉而所以其幸國家未誅戮彼或弛而免於充軍者政之寬仁故歟或由草賊歟斗筲之輩不足算耳固是千鈞之弩不為鼷而發機之謂與宜矣大率自古諷國敵于朝廷之屬罕無人之不罪者神能罰之神之俾免者或天必喪焉天之為憐者或理自亡矣更無否者矧乎彼謗正法之人奚待閻王新闢於底根之邦乎自己既造阿鼻之業天授生身坼而陷莫如之何豫便為渠追薦且懲後者退而顧之是書其文雖從金口而宣其義親自祖手發暉而復文義雖既來自支竺流之見聞獨在我邦永霑其益則驗知夫神聖之所護今尚儼存不可疑猜焉此皆沐我國家之阜恩者也猗歟盛哉我本邦也時享保歲旅戊申蕤賓穀旦大日本洛京華嚴寺住持沙門僧𤀹鳳潭畔睇敬書于遊心觀之壁
